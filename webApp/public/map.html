<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POI and Vélo'v map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    #map { height: 85vh; }
    .legend { background: white; padding: 8px 12px; border: 1px solid #999; line-height: 1.5; }
    .legend i { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 6px; }
  </style>
</head>
<body>
  <h1>Map of tourist POIs and Vélo'v stations</h1>
  <p>
    <label>POI Type: <select id="typeSelect"><option value="ALL">ALL</option></select></label>
    <label><input type="checkbox" id="stationsCheckbox" checked> Show Vélo'v stations</label>
    <a href="index.html">Back to search</a>
  </p>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const typeColors = {
      "ACTIVITE": "#e41a1c", "COMMERCE_ET_SERVICE": "#ff7f00", "DEGUSTATION": "#4daf4a",
      "EQUIPEMENT": "#984ea3", "FETE_ET_MANIFESTATION": "#f781bf", "HEBERGEMENT_COLLECTIF": "#a65628",
      "HEBERGEMENT_LOCATIF": "#ffd92f", "HOTELLERIE": "#666666", "HOTELLERIE_PLEIN_AIR": "#66c2a5",
      "PATRIMOINE_CULTUREL": "#e6ab02", "RESTAURATION": "#b10026"
    };
    const stationColor = "#0050d0";

    const map = L.map("map").setView([45.76, 4.84], 13);
    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const poiLayer = L.layerGroup().addTo(map);
    const stationLayer = L.layerGroup().addTo(map);
    let allPois = [];

    const typeSelect = document.getElementById("typeSelect");
    const stationsCheckbox = document.getElementById("stationsCheckbox");

    function drawPois() {
      poiLayer.clearLayers();
      const type = typeSelect.value;
      for (const poi of allPois) {
        if (type !== "ALL" && poi.type !== type) continue;
        L.circleMarker([poi.coordinates[1], poi.coordinates[0]], {
          radius: 4, color: typeColors[poi.type] || "black", fillOpacity: 0.7, weight: 1
        }).bindPopup(`<b>${poi.name}</b><br>${poi.type}<br>${(poi.themes || []).join(", ")}`)
          .addTo(poiLayer);
      }
    }

    async function init() {
      const response = await fetch("/mapdata");
      const data = await response.json();
      allPois = data.pois;

      const types = [...new Set(allPois.map(p => p.type))].sort();
      for (const type of types) {
        const option = document.createElement("option");
        option.value = type;
        option.textContent = type;
        typeSelect.appendChild(option);
      }

      for (const station of data.stations) {
        L.circle([station.coordinates[1], station.coordinates[0]], {
          radius: 4 + station.stands, color: stationColor, fillColor: stationColor,
          fillOpacity: 0.5, weight: 2
        }).bindPopup(`<b>${station.name}</b><br>${station.commune}<br>${station.stands} stands`)
          .addTo(stationLayer);
      }

      const legend = L.control({ position: "bottomleft" });
      legend.onAdd = () => {
        const div = L.DomUtil.create("div", "legend");
        let html = `<i style="background:${stationColor}"></i>Vélo'v station<br>`;
        for (const type of types) {
          html += `<i style="background:${typeColors[type]}"></i>${type}<br>`;
        }
        div.innerHTML = html;
        return div;
      };
      legend.addTo(map);

      drawPois();
    }

    typeSelect.addEventListener("change", drawPois);
    stationsCheckbox.addEventListener("change", () => {
      if (stationsCheckbox.checked) map.addLayer(stationLayer);
      else map.removeLayer(stationLayer);
    });

    init();
  </script>
</body>
</html>
